<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Box 11B4</title>
    <link rel="icon" type="image/png" href="../snapedit_1774011297061.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a href="../index.html" class="back-btn">❮ Về Trang Chủ</a>

    <div class="chat-container">
        <div class="chat-header">
            <h2>KÊNH CHÁT 11B4 🚀</h2>
            <p>Nơi lưu giữ những câu chuyện không hồi kết</p>
        </div>

        <div class="chat-box" id="chatBox">
            </div>

<div class="chat-input-area">
            
            <input type="file" id="imageInput" accept="image/*" onchange="checkFile()">
            
            <label for="imageInput" class="upload-btn" id="uploadIcon">
                🖼️
            </label>

            <input type="text" id="msgInput" placeholder="Nhập tin nhắn..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" class="send-btn">Gửi</button>
            
        </div>    </div>
        <footer style="text-align: center;">
    <p>&copy; 2026 Made with 💖 by Hà Nhật Phi in 11B4 </p>
</footer>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script> 
    <script src="chat.js"></script>
</body>
</html>
</body>
