<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenium Limited Edition AI 11B4</title>
    <link rel="icon" type="image/png" href="../snapedit_1774011297061.png">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #8c52ff; color: white; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { color: white; text-decoration: none; font-weight: bold; background: rgba(0,0,0,0.2); padding: 8px 15px; border-radius: 5px; }
        
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .message { margin-bottom: 20px; display: flex; flex-direction: column; }
        .user-message { align-items: flex-end; }
        .bot-message { align-items: flex-start; }
        .msg-bubble { max-width: 80%; padding: 12px 18px; border-radius: 15px; line-height: 1.5; font-size: 16px; }
        .user-message .msg-bubble { background: #e0f7fa; color: #006064; border-bottom-right-radius: 2px; }
        .bot-message .msg-bubble { background: white; border: 1px solid #ddd; border-bottom-left-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .input-area { background: white; padding: 15px; border-top: 1px solid #ddd; display: flex; justify-content: center; }
        .input-box { display: flex; width: 100%; max-width: 900px; gap: 10px; }
        input[type="text"] { flex: 1; padding: 15px; border-radius: 25px; border: 1px solid #ccc; font-size: 16px; outline: none; }
        button { padding: 10px 25px; background: #8c52ff; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

    <div class="header">
        <a href="../index.html" class="back-btn">❮ Về Trang Chủ</a>
        <h2>Prenium Limited Edition AI 11B4</h2>
        <div style="width: 100px;"></div> </div>

    <div class="chat-container" id="chat-content">
        <div class="message bot-message">
            <div class="msg-bubble">
                <strong>🤖 AI Limited edition 11b4:</strong><br>
                Chào cậu! Trạm chỉ huy học tập 11B4 đã sẵn sàng. Tớ đã nắm toàn bộ danh sách lớp, thời khóa biểu và sẵn sàng bung sức cùng cậu cày cuốc. Cậu muốn hỏi gì?
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <input type="text" id="user-input" maxlength="2000" placeholder="Nhập câu hỏi chi tiết vào đây...">
            <button id="send-btn">Gửi</button>
        </div>
    </div>
    <footer style="text-align: center;">
    <p>&copy; 2026 Made with 💖 by Hà Nhật Phi in 11B4 </p>
</footer>

    <script src="bot_chinh.js"></script>
</body>
</html>
